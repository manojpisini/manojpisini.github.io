<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | MP//2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-line-icons@2.5.5/css/simple-line-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/emoji-js/3.8.1/emoji.js" integrity="sha512-fz5YZnCd7LYZVpbgjaRq+jlhxhCXuEp/q2lj/QCQWMoBL+/KuKXeasi1fd/i/qpOnDTwSm2xo+7lI7Cv8Ukpjg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>
    <div class="site-wrapper">
        <header class="system-header">
            <div class="header-block">
                <a href="index.html" style="text-decoration: none; color: inherit; font-family: var(--font-mono); font-weight: 700;">MP//2026</a>
            </div>
            <div class="header-block">
                <nav>
                    <ul class="nav-links">
                        <li><a href="background.html">BACKGROUND</a></li>
                        <li><a href="projects.html">PROJECTS</a></li>
                        <li><a href="blog.html" class="active">BLOG</a></li>
                        <li><a href="contact.html">CONTACT</a></li>
                    </ul>
                </nav>
            </div>
            <div class="header-block">
                <button id="theme-toggle" class="theme-toggle-btn">TOGGLE THEME</button>
            </div>
        </header>

        <main class="system-main" style="padding: 0;">
            <div id="post-banner-container"></div>
            
            <article class="blog-post-container">
                <div id="post-meta" class="project-meta">LOADING_METADATA...</div>
                <h1 id="post-title" style="font-size: 3rem; margin: 20px 0; line-height: 1.1;">LOADING_TITLE...</h1>
                <p id="post-description" class="intro-text" style="font-size: 1.25rem; color: #888; margin-bottom: 40px;"></p>
                
                <hr style="border: none; border-top: 1px solid var(--text-primary); margin: 40px 0;">

                <div id="post-content" class="blog-content" style="font-family: var(--font-body); line-height: 1.8;">
                    FETCHING_CONTENT...
                </div>

                <div style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--text-primary);">
                    <a href="blog.html" class="bold-link">← RETURN</a>
                </div>
            </article>
        </main>

        <footer class="system-footer">
            <span>© 2026 MANOJ PISINI</span>
            <span>STABLE_V2.0</span>
        </footer>
    </div>

    <script>
        // Use logic from main script for theme but specialized for markdown rendering
        const htmlElement = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Re-render Mermaid if active
            if (window.mermaid && document.querySelectorAll('.mermaid').length > 0) {
                location.reload(); // Simplest way to re-render all dynamic components correctly
            }
        });

        async function loadMarkdownPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('src');
            if (!fileName) {
                window.location.href = 'blog.html';
                return;
            }

            try {
                const response = await fetch(`blog/${fileName}`);
                if (!response.ok) {
                    throw new Error(`STATUS_${response.status}`);
                }
                const text = await response.text();
                
                // Simple Frontmatter Parser
                const parts = text.split('---');
                let markdownContent = text;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    markdownContent = parts.slice(2).join('---');
                    
                    yaml.split('\n').forEach(line => {
                        const [key, ...value] = line.split(':');
                        if (key && value) {
                            metadata[key.trim()] = value.join(':').trim();
                        }
                    });
                }

                // Apply Metadata
                document.title = `${metadata.title || 'Post'} | MP//2026`;
                document.getElementById('post-title').innerText = (metadata.title || fileName).toUpperCase();
                document.getElementById('post-meta').innerText = `PUBLISHED: ${metadata.date || 'UNSPECIFIED'} // SOURCE: MD_PROTOCOL`;
                document.getElementById('post-description').innerText = metadata.description || '';
                
                if (metadata.banner) {
                    document.getElementById('post-banner-container').innerHTML = `<img src="${metadata.banner}" class="blog-banner">`;
                }

                // Configure Marked with Alert support
                const renderer = new marked.Renderer();
                
                renderer.blockquote = function(token) {
                    const text = token.text || '';
                    const alertMatch = text.match(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
                    
                    if (alertMatch) {
                        const type = alertMatch[1].toUpperCase();
                        const cleanContent = text.replace(/\[!.*\]/i, '').trim();
                        return `<div class="markdown-alert markdown-alert-${type.toLowerCase()}">
                                    <div class="markdown-alert-title">${type}</div>
                                    <p>${cleanContent}</p>
                                </div>`;
                    }
                    return `<blockquote>${this.parser.parse(token.tokens)}</blockquote>`;
                };

                // Ensure links are monochrome
                renderer.link = function(href, title, text) {
                    return `<a href="${href}" title="${title || ''}" class="md-link">${text}</a>`;
                };

                // Initialize Emoji Convertor
                const emoji = new EmojiConvertor();
                emoji.init_unified();
                emoji.replace_mode = 'unified';
                emoji.allow_native = true;

                // Process Emojis in the raw text
                const contentWithEmojis = emoji.replace_colons(markdownContent);

                marked.setOptions({ 
                    renderer: renderer,
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true,
                    allowHtml: true, // Allow icons via <i> tags
                    highlight: function(code, lang) {
                        if (Prism.languages[lang]) {
                            return Prism.highlight(code, Prism.languages[lang], lang);
                        } else {
                            return code; // Fallback
                        }
                    }
                });

                // Render Markdown
                const container = document.getElementById('post-content');
                container.innerHTML = marked.parse(contentWithEmojis);

                // Initialize Prism
                if (window.Prism) {
                    Prism.highlightAll();
                }

                // Render Math (KaTeX)
                if (window.renderMathInElement) {
                    renderMathInElement(container, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }

                // Initialize Mermaid
                if (window.mermaid) {
                    const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
                    mermaid.initialize({ 
                        startOnLoad: false, 
                        theme: currentTheme,
                        themeVariables: {
                            primaryColor: '#ffffff',
                            primaryTextColor: '#000000',
                            primaryBorderColor: '#ffffff',
                            lineColor: '#888888',
                            secondaryColor: '#000000',
                            tertiaryColor: '#ffffff'
                        }
                    });
                    mermaid.init(undefined, container.querySelectorAll('.mermaid'));
                }

            } catch (error) {
                document.getElementById('post-content').innerHTML = `
                    <div class="error" style="font-family: var(--font-mono); padding: 40px; border: 1px solid var(--text-primary); line-height: 1.6;">
                        ERROR_ACCESSING_LOCAL_BUFFER<br>
                        FILE: ${fileName}<br>
                        ERROR: ${error.message}<br><br>
                        >>> [NOTE]: If you are viewing this locally via file://, browsers block background fetching. Please use a local server (e.g. VS Code Live Server) to preview posts.
                    </div>`;
            }
        }

        loadMarkdownPost();
    </script>
</body>
</html>
