name: Fetch Dev.to Blogs

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch_devto:
    runs-on: ubuntu-latest
    concurrency:
      group: devto-sync
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch Dev.to Articles
        run: |
          curl -sf \
            -H "Accept: application/vnd.forem.api-v1+json" \
            "https://dev.to/api/articles?username=manojpisini&per_page=10" \
            -o blog/devto-cache.json || echo "[]" > blog/devto-cache.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add blog/devto-cache.json

          # Exit cleanly if nothing changed
          git diff --cached --quiet && echo "No changes to commit." && exit 0

          git commit -m "chore: Sync dev.to blogs backup"

          # Rebase on top of any remote changes, then push
          git pull --rebase origin main
          git push origin main
